services:
  # 后端服务（本地开发用，生产可单独构建镜像）
  api:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - milvus
      - etcd
      - elasticsearch
      - postgres
      - redis
    restart: unless-stopped

  # 元数据协调服务（Milvus 2.6 standalone 镜像不再内置 etcd，需外部提供）
  etcd:
    image: quay.io/coreos/etcd:v3.5.11
    environment:
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
    ports:
      - "2379:2379"
    volumes:
      - etcd_data:/etcd
    restart: unless-stopped

  # 向量数据库
  milvus:
    image: milvusdb/milvus:latest
    command: ["milvus", "run", "standalone"]
    ports:
      - "19530:19530"
    environment:
      # 指向上面独立的 etcd 服务（覆盖镜像默认 localhost:2379）
      - ETCD_ENDPOINTS=etcd:2379
      # Milvus 2.6 standalone 不再内置 MinIO，改用本地磁盘存储，省去对象存储依赖
      - COMMON_STORAGETYPE=local
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - etcd
    restart: unless-stopped

  # 关键词检索
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped

  # 业务库
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=cs_kb
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  # 短期记忆 / 缓存
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  etcd_data:
  milvus_data:
  es_data:
  pg_data:
  redis_data:
